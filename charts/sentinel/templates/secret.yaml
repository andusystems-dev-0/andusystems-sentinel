apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
  labels:
    app: sentinel
type: Opaque
data:
  forgejo-sentinel-token: {{ .Values.secrets.forgejoSentinelToken | b64enc | quote }}
  forgejo-operator-token: {{ .Values.secrets.forgejoOperatorToken | b64enc | quote }}
  discord-bot-token: {{ .Values.secrets.discordBotToken | b64enc | quote }}
  [AI_PROVIDER]-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  github-token: {{ .Values.secrets.githubToken | b64enc | quote }}
  forgejo-webhook-secret: {{ .Values.secrets.forgejoWebhookSecret | b64enc | quote }}
